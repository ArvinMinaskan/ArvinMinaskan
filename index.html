<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arvin Minaskan | Sound Architect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@200;400;900&family=Space+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --black: #080808;
            --white: #f5f5f5;
            --red: #ff0000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }

        body {
            background-color: var(--black);
            color: var(--white);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Custom Red Laser Cursor */
        #cursor {
            width: 6px;
            height: 6px;
            background: var(--red);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            box-shadow: 0 0 12px var(--red), 0 0 20px var(--red);
            transform: translate(-50%, -50%);
        }

        /* Hero Section */
        .hero {
            height: 120vh;
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            padding: 2rem;
            position: relative;
        }

        .hero-image {
            grid-column: 1 / 9;
            height: 70vh;
            background: url('1000063108-Picsart-AiImageEnhancer.jpg') no-repeat center;
            background-size: cover;
            filter: grayscale(1) brightness(0.6);
            clip-path: polygon(0 0, 100% 0, 95% 100%, 0% 100%);
        }

        .hero-title {
            grid-column: 4 / 13;
            grid-row: 1;
            margin-top: 45vh;
            z-index: 2;
            mix-blend-mode: exclusion;
        }

        .hero-title h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: clamp(3rem, 10vw, 8rem);
            line-height: 0.9;
            font-weight: 700;
        }

        .sub-text {
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #777;
            margin-top: 20px;
        }

        /* Portrait Section */
        .section {
            padding: 10vh 5vw;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
            align-items: center;
        }

        .portrait {
            width: 100%;
            max-width: 500px;
            filter: grayscale(1);
            transition: 0.8s filter ease;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .portrait:hover { filter: grayscale(0); }

        h2 { font-family: 'Syncopate', sans-serif; font-size: 2.5rem; margin-bottom: 1.5rem; }
        p { font-size: 1rem; font-weight: 200; line-height: 1.6; color: #aaa; }

        footer {
            padding: 50px 5vw;
            border-top: 1px solid #1a1a1a;
            display: flex;
            justify-content: space-between;
            font-family: 'Space Mono';
            font-size: 0.6rem;
            color: #444;
        }

        [data-scroll] { opacity: 0; transform: translateY(30px); transition: 1s ease-out; }
        .visible { opacity: 1; transform: translateY(0); }

    </style>
</head>
<body>

    <div id="cursor"></div>

    <header class="hero">
        <div class="hero-image"></div>
        <div class="hero-title">
            <p class="sub-text">ESTABLISHED 2026</p>
            <h1>Arvin<br>Minaskan</h1>
            <p class="sub-text">Audio Engineer & Rockstar</p>
        </div>
    </header>

    <section class="section">
        <div>
            <h2 data-scroll>The Vision</h2>
            <p data-scroll>Breaking the boundaries of modern rock and sound engineering. Arvin Minaskan combines visceral energy with surgical precision in audio production.</p>
        </div>
        <div data-scroll>
            <!-- مطمئن شو اسم فایل در گیت‌هاب دقیقا profile4.png باشد -->
            <img src="profile4.png" class="portrait" alt="Arvin Minaskan">
        </div>
    </section>

    <footer>
        <div>© 2026 Arvin Minaskan</div>
        <div>STAY LOUD.</div>
    </footer>

    <script>
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', e => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('visible');
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('[data-scroll]').forEach(el => observer.observe(el));
    </script>
</body>
</html>
