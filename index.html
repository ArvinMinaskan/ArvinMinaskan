    <style>
        :root {
            --black: #080808;
            --white: #f5f5f5;
            --red: #ff0000;
            --grey: #1a1a1a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }

        body {
            background-color: var(--black);
            color: var(--white);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.04;
            pointer-events: none;
            z-index: 9999;
        }

        #cursor {
            width: 8px;
            height: 8px;
            background: var(--red);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            box-shadow: 0 0 10px var(--red), 0 0 20px var(--red);
            transition: transform 0.05s linear;
        }

        .hero {
            height: 140vh;
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            padding: 2rem;
            position: relative;
        }

        .hero-image {
            grid-column: 1 / 9;
            height: 80vh;
            background: url('1000063108-Picsart-AiImageEnhancer.jpg') no-repeat center;
            background-size: cover;
            filter: grayscale(1) brightness(0.6);
            clip-path: polygon(0 0, 100% 0, 95% 100%, 0% 100%);
        }

        .hero-title {
            grid-column: 4 / 13;
            grid-row: 1;
            margin-top: 55vh;
            z-index: 2;
            mix-blend-mode: exclusion;
        }

        .hero-title h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: clamp(3rem, 10vw, 8rem);
            line-height: 0.9;
            font-weight: 700;
            color: var(--white);
        }

        .sub-text {
            font-family: 'Space Mono', monospace;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #777;
            margin-top: 20px;
        }

        .section {
            padding: 15vh 5vw;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 100px;
            align-items: center;
        }

        .portrait-container {
            width: 100%;
            min-height: 400px;
            background: #111;
        }

        .portrait {
            width: 100%;
            display: block;
            filter: grayscale(1);
            transition: 0.8s filter cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .portrait:hover { filter: grayscale(0); }

        h2 {
            font-family: 'Syncopate', sans-serif;
            font-size: 3rem;
            margin-bottom: 2rem;
        }

        p {
            font-size: 1.1rem;
            font-weight: 200;
            line-height: 1.8;
            max-width: 500px;
            color: #aaa;
        }

        .work-grid {
            grid-column: 1 / 3;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 100px;
        }

        .work-item {
            border-top: 1px solid #333;
            padding-top: 20px;
            transition: 0.4s;
        }

        .work-item:hover { border-top-color: var(--red); }

        .work-item span { font-family: 'Space Mono'; font-size: 0.7rem; color: #666; }
